[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"
 
[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#94e2d5"
white   = "#bac2de"
 
[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#94e2d5"
white   = "#a6adc8"
 
[font]
# Main font size
size = 14.0

# Normal font face
[font.normal]
family = "IosevkaTerm"  # Replace with your preferred font
style = "Regular"

# Bold font face
[font.bold]
family = "IosevkaTerm"
style = "Bold"

# Italic font face
[font.italic]
family = "IosevkaTerm"
style = "Italic"

# Optional: Fine-tune character positioning
[font.offset]
x = 0
y = 2  # Increase line spacing slightly

# Optional: Use built-in box drawing characters (recommended)
# builtin_box_drawing = true
# [window]
# decorations = 'none'
