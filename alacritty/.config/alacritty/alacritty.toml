[colors.primary]
background = "#272e33"
foreground = "#d8dee9"

[colors.normal]
black = "#3b4252"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#88c0d0"
white = "#e5e9f0"

[colors.bright]
black = "#4c566a"
red = "#bf616a"
green = "#a3be8c"
yellow = "#ebcb8b"
blue = "#81a1c1"
magenta = "#b48ead"
cyan = "#8fbcbb"
white = "#eceff4"
[font]
# Main font size
size = 14.0

# Normal font face
[font.normal]
family = "Iosevka"  # Replace with your preferred font
style = "Regular"

# Bold font face
[font.bold]
family = "Iosevka"
style = "Bold"

# Italic font face
[font.italic]
family = "Iosevka"
style = "Italic"

# Optional: Fine-tune character positioning
[font.offset]
x = 0
y = 2  # Increase line spacing slightly

# Optional: Use built-in box drawing characters (recommended)
# builtin_box_drawing = true
[window]
decorations = 'none'
