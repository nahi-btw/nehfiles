# Transparency, corner radius, and fading windows
# Save this file as ~/.config/picom/picom.conf

# ====================================
# CORNER RADIUS (tiny)
# ====================================
corner-radius = 9.0;
rounded-corners-exclude = [
  "class_g = 'Bar'",                    # Skip polybar, etc.
  "class_g = 'i3-frame'",               # Skip i3 title bars
  "window_type = 'dock'",               # Skip docks
  "window_type = 'desktop'"             # Skip desktop
];
round-borders = 1;                      # Round the borders too
round-borders-exclude = [
  "class_g = 'firefox'",                # Firefox occasionally has issues
  "class_g = 'dwm'"
];

# ====================================
# TRANSPARENCY
# ====================================
opacity-rule = [
  "90:class_g = 'Alacritty'",           # 90% opacity for Alacritty
  "85:class_g = 'kitty'",               # 85% for Kitty
  "80:class_g = 'Thunderbird'",         # 80% for Thunderbird
 #  "85:class_g = *",                     # Default 85% for all other windows
  "100:class_g = 'dmenu'",              # Fully opaque for dmenu
  "100:class_g = 'Polybar'",            # Fully opaque for polybar
  "100:class_g = 'Toolkit'",
  "100:class_g = 'i3-frame'",           # Fully opaque for i3 title bars
  "100:_NET_WM_STATE@:32a = '_NET_WM_STATE_FULLSCREEN'"  # Opaque when fullscreen
];
inactive-opacity = 0.85;                # Slightly dimmer when inactive
inactive-opacity-override = false;      # Don't override per-window rules
opacity-transition = { duration = 0.2 }; # Smooth opacity changes

# ====================================
# FADING ANIMATIONS
# ====================================
fading = true;
fade-delta = 4;                         # Speed of fading (smaller = smoother, slower)
fade-in-step = 0.03;                    # How much to fade in per step
fade-out-step = 0.03;                   # How much to fade out per step
fade-exclude = [
  "class_g = 'dmenu'",                  # No fade for dmenu
  "class_g = 'Polybar'",                # No fade for polybar
  "window_type = 'dock'",               # No fade for docks
  "window_type = 'desktop'",            # No fade for desktop
  "_NET_WM_STATE@:32a = '_NET_WM_STATE_FULLSCREEN'"  # No fade when fullscreen
];

# ====================================
# GENERAL SETTINGS
# ====================================
backend = "glx";                        # Use GLX for best performance
vsync = true;                           # Prevent screen tearing
mark-wmwin-focused = true;              # Mark windows as focused
mark-ovredir-focused = true;            # Mark override-redirect windows as focused
detect-rounded-corners = true;          # Better corner detection
detect-client-opacity = true;           # Respect client-side opacity
refresh-rate = 0;                       # Auto-detect monitor refresh rate
unredir-if-possible = true;             # Unredirect fullscreen windows

# ====================================
# PERFORMANCE
# ====================================
glx-no-stencil = true;                  # Slightly faster rendering
glx-copy-from-front = false;            # Better performance
glx-use-gpu = true;                     # Use GPU if available
xrender-sync-fence = true;              # Sync for xrender
use-damage = true;                      # Only redraw damaged areas

# ====================================
# SHADOWS (optional - comment out if you don't want)
# ====================================
