# ====================================
# CORNER RADIUS
# ====================================
corner-radius = 9.0;
rounded-corners-exclude = [
  "class_g = 'Bar'",
  "class_g = 'i3-frame'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# ====================================
# TRANSPARENCY
# ====================================
opacity-rule = [
  "90:class_g = 'Alacritty'",
  "85:class_g = 'kitty'",
  "80:class_g = 'Thunderbird'",
 #  "85:class_g = *",
  "100:class_g = 'dmenu'",
  "100:class_g = 'Polybar'",
  "100:class_g = 'Toolkit'",
  "100:class_g = 'i3-frame'",
  "100:_NET_WM_STATE@:32a = '_NET_WM_STATE_FULLSCREEN'"
];
inactive-opacity = 0.85;
inactive-opacity-override = false;

# ====================================
# FADING ANIMATIONS
# ====================================
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-exclude = [
  "class_g = 'dmenu'",
  "class_g = 'Polybar'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_NET_WM_STATE@ = '_NET_WM_STATE_FULLSCREEN'"
];

# ====================================
# GENERAL SETTINGS
# ====================================
backend = "glx";
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
unredir-if-possible = false;

# ====================================
# PERFORMANCE
# ====================================
use-damage = true;

# ====================================
# SHADOWS (optional - comment out if you don't want)
# ====================================
#shadow = true;
#shadow-radius = 7;
#shadow-offset-x = -7;
#shadow-offset-y = -7;
#shadow-opacity = 0.75;
#shadow-exclude = [
#  "class_g = 'Polybar'",
#  "class_g = 'dmenu'",
#  "window_type = 'dock'"
#];
